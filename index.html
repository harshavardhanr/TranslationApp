<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveTranslate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #16191f;
      --surface2: #1e2229;
      --border: rgba(255,255,255,0.08);
      --accent: #4f8ef7;
      --accent2: #a78bfa;
      --text: #f0f2f7;
      --subtext: #8a90a0;
      --success: #34d399;
      --danger: #f87171;
      --radius: 18px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    header {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--subtext);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--subtext);
      transition: background 0.3s;
    }
    .status-dot.active    { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.listening { background: var(--danger);  box-shadow: 0 0 6px var(--danger); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

    .warning-banner {
      width: 100%;
      max-width: 480px;
      background: rgba(251,146,60,0.1);
      border: 1px solid rgba(251,146,60,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fb923c;
      margin-bottom: 12px;
      display: none;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Language Bar ── */
    .lang-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .lang-select {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      outline: none;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 10px;
      transition: background 0.2s;
      text-align: center;
      appearance: none;
      -webkit-appearance: none;
    }
    .lang-select:hover { background: rgba(255,255,255,0.06); }
    option { background: #1e2229; color: var(--text); }

    .swap-btn {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: rgba(79,142,247,0.12);
      border: 1px solid rgba(79,142,247,0.25);
      color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.3s;
    }
    .swap-btn:hover    { background: rgba(79,142,247,0.2); }
    .swap-btn.spinning { transform: rotate(180deg); }

    /* ── Panels ── */
    .panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px;
    }

    /*
      Panel B is rotated 180° so Person B can read from their side.
      Its DOM order is the same as Panel A (heard → trans), but after
      rotation Person B sees them in reverse: trans on top, heard below —
      still readable because the whole element is flipped.
    */
    .panel-b {
      transform: rotate(180deg);
      border-top: 1px solid var(--border);
    }

    /* Active panel gets a left-border glow to indicate it's listening */
    .panel.listening-here {
      background: rgba(79,142,247,0.03);
    }
    .panel.listening-here .speech-bubble.heard-bub {
      border-color: rgba(79,142,247,0.5);
    }

    /* ── Speech bubbles ── */
    .speech-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      transition: border-color 0.3s;
    }
    .speech-bubble.translating { border-color: rgba(167,139,250,0.4); }

    .bubble-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--subtext);
      margin-bottom: 8px;
    }

    .api-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 9px;
      border-radius: 999px;
      background: rgba(99,102,241,0.12);
      color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.25);
      float: right;
      margin-top: 1px;
    }
    .api-pill-dot { width:6px;height:6px;border-radius:50%;background:#818cf8; }

    .bubble-text {
      font-size: 17px;
      line-height: 1.5;
      color: var(--text);
      min-height: 28px;
    }
    .bubble-text.placeholder { color: var(--subtext); font-style: italic; font-size: 15px; }

    .cursor {
      display: inline-block;
      width: 2px; height: 18px;
      background: var(--accent);
      border-radius: 1px;
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }

    /* ── Translating Pills ── */
    .t-pills { display:flex;flex-direction:column;gap:9px;padding-top:2px; }
    .t-pill {
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        var(--surface2) 0%,
        rgba(79,142,247,0.2) 40%,
        rgba(167,139,250,0.2) 60%,
        var(--surface2) 100%
      );
      background-size: 300% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
    }
    .t-pill:nth-child(1) { width:80%; }
    .t-pill:nth-child(2) { width:52%;animation-delay:0.18s; }
    @keyframes shimmer { 0%{background-position:100% 0}100%{background-position:-100% 0} }

    /* ── Centre Controls ── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      width: 100%;
    }

    /* "Now listening for…" chip */
    .turn-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--subtext);
      transition: all 0.3s;
      opacity: 0;
    }
    .turn-chip.visible { opacity: 1; }
    .turn-chip.active-a { border-color: rgba(79,142,247,0.4); color: var(--accent); }
    .turn-chip.active-b { border-color: rgba(167,139,250,0.4); color: var(--accent2); }

    .turn-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1s infinite;
    }

    .mic-btn {
      width: 66px; height: 66px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: white;
      font-size: 26px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(79,142,247,0.35);
    }
    .mic-btn:hover  { transform: scale(1.05); box-shadow: 0 6px 28px rgba(79,142,247,0.5); }
    .mic-btn:active { transform: scale(0.95); }
    .mic-btn.recording {
      background: linear-gradient(135deg, var(--danger), #fb923c);
      box-shadow: 0 4px 20px rgba(248,113,113,0.4);
      animation: mic-pulse 1.5s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%,100%{box-shadow:0 4px 20px rgba(248,113,113,0.4)}
      50%{box-shadow:0 4px 36px rgba(248,113,113,0.7)}
    }

    .mic-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid var(--danger);
      opacity: 0;
      display: none;
      animation: ring-out 1.5s ease-out infinite;
    }
    .mic-ring.show { display: block; }
    @keyframes ring-out { 0%{inset:-4px;opacity:0.65}100%{inset:-18px;opacity:0} }

    .side-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--subtext);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
    }
    .side-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    /* ── History ── */
    .history-section {
      width: 100%;
      max-width: 480px;
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-header {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--subtext); padding: 0 4px;
    }
    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 4px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
    .history-original   { font-size: 13px; color: var(--subtext); }
    .history-translated { font-size: 15px; color: var(--text); font-weight: 500; }
    .history-meta       { font-size: 11px; color: var(--subtext); opacity: 0.6; margin-top: 2px; }

    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">🌐</div>
      LiveTranslate
    </div>
    <div class="status-pill">
      <div class="status-dot active" id="statusDot"></div>
      <span id="statusText">Ready</span>
    </div>
  </header>

  <div class="warning-banner" id="warningBanner">
    ⚠️ Speech recognition not supported. Try Chrome or Edge.
  </div>

  <div class="card">

    <!-- Language selector -->
    <div class="lang-bar">
      <select class="lang-select" id="langA">
        <option value="en">English</option>
        <option value="de">German</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="nl">Dutch</option>
        <option value="ru">Russian</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
        <option value="ko">Korean</option>
        <option value="ar">Arabic</option>
        <option value="hi">Hindi</option>
      </select>
      <button class="swap-btn" id="swapBtn">⇌</button>
      <select class="lang-select" id="langB">
        <option value="de">German</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="nl">Dutch</option>
        <option value="ru">Russian</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
        <option value="ko">Korean</option>
        <option value="ar">Arabic</option>
        <option value="hi">Hindi</option>
      </select>
    </div>

    <!--
      Person A panel — normal orientation.
      Heard text on top, translation below.
    -->
    <div class="panel" id="panelA">
      <div class="speech-bubble heard-bub" id="bubA-heard">
        <div class="bubble-label">Person A · <span id="lblA-lang">English</span></div>
        <div class="bubble-text placeholder" id="txtA-heard">Waiting to listen…</div>
      </div>
      <div class="speech-bubble" id="bubA-trans">
        <div class="bubble-label">
          Translation → <span id="lblA-target">German</span>
          <span class="api-pill"><span class="api-pill-dot"></span>Google</span>
        </div>
        <div class="bubble-text placeholder" id="txtA-trans">Translation will appear here</div>
      </div>
    </div>

    <!-- Centre mic + "listening for" indicator -->
    <div class="controls">
      <div class="turn-chip" id="turnChip">
        <div class="turn-dot"></div>
        <span id="turnChipText">Listening for English</span>
      </div>
      <div class="controls-row">
        <button class="side-btn" id="clearBtn" title="Clear all">🗑</button>
        <button class="mic-btn" id="micBtn">
          <span id="micIcon">🎤</span>
          <div class="mic-ring" id="micRing"></div>
        </button>
        <div style="width:44px"></div>
      </div>
    </div>

    <!--
      Person B panel — rotated 180° so B reads it right-side up.
      Same DOM order as Panel A; after rotation Person B sees
      translation at visual-top and heard-text at visual-bottom.
    -->
    <div class="panel panel-b" id="panelB">
      <div class="speech-bubble heard-bub" id="bubB-heard">
        <div class="bubble-label">Person B · <span id="lblB-lang">German</span></div>
        <div class="bubble-text placeholder" id="txtB-heard">Waiting to listen…</div>
      </div>
      <div class="speech-bubble" id="bubB-trans">
        <div class="bubble-label">
          Translation → <span id="lblB-target">English</span>
          <span class="api-pill"><span class="api-pill-dot"></span>Google</span>
        </div>
        <div class="bubble-text placeholder" id="txtB-trans">Translation will appear here</div>
      </div>
    </div>

  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-header">History</div>
    <div id="historyList"></div>
  </div>

  <script>
    const GOOGLE_API_KEY = 'AIzaSyBlV5AVo86fFt_ccS3IdTdb7WH0aF9_a-U';

    const LANG_NAMES = {
      en:'English', de:'German', fr:'French', es:'Spanish', it:'Italian',
      pt:'Portuguese', nl:'Dutch', ru:'Russian', ja:'Japanese', zh:'Chinese',
      ko:'Korean', ar:'Arabic', hi:'Hindi'
    };
    const SPEECH_LANG = {
      en:'en-US', de:'de-DE', fr:'fr-FR', es:'es-ES', it:'it-IT',
      pt:'pt-PT', nl:'nl-NL', ru:'ru-RU', ja:'ja-JP', zh:'zh-CN',
      ko:'ko-KR', ar:'ar-SA', hi:'hi-IN'
    };

    // ── DOM ────────────────────────────────────────────────────────────────
    const langAEl    = document.getElementById('langA');
    const langBEl    = document.getElementById('langB');
    const swapBtn    = document.getElementById('swapBtn');
    const clearBtn   = document.getElementById('clearBtn');
    const micBtn     = document.getElementById('micBtn');
    const micIcon    = document.getElementById('micIcon');
    const micRing    = document.getElementById('micRing');
    const statusDot  = document.getElementById('statusDot');
    const statusTxt  = document.getElementById('statusText');
    const turnChip   = document.getElementById('turnChip');
    const turnChipTx = document.getElementById('turnChipText');
    const panelA     = document.getElementById('panelA');
    const panelB     = document.getElementById('panelB');

    const bubA_h = document.getElementById('bubA-heard'), txtA_h = document.getElementById('txtA-heard');
    const bubA_t = document.getElementById('bubA-trans'), txtA_t = document.getElementById('txtA-trans');
    const bubB_h = document.getElementById('bubB-heard'), txtB_h = document.getElementById('txtB-heard');
    const bubB_t = document.getElementById('bubB-trans'), txtB_t = document.getElementById('txtB-trans');

    const lblA_lang   = document.getElementById('lblA-lang');
    const lblA_target = document.getElementById('lblA-target');
    const lblB_lang   = document.getElementById('lblB-lang');
    const lblB_target = document.getElementById('lblB-target');

    const historySection = document.getElementById('historySection');
    const historyList    = document.getElementById('historyList');

    // ── State ──────────────────────────────────────────────────────────────
    let isSessionActive = false;
    let currentTurn     = 'A';   // whose turn it is to speak: 'A' or 'B'
    let recog           = null;
    let restartTimer    = null;
    const history       = [];

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      document.getElementById('warningBanner').style.display = 'block';
      micBtn.style.opacity = '0.4';
      micBtn.style.pointerEvents = 'none';
    }

    // ── UI helpers ─────────────────────────────────────────────────────────
    function setStatus(type, text) {
      statusDot.className = 'status-dot' + (type ? ' ' + type : '');
      statusTxt.textContent = text;
    }

    function updateTurnIndicator() {
      if (!isSessionActive) {
        turnChip.className = 'turn-chip';
        return;
      }
      const isA    = currentTurn === 'A';
      const lang   = LANG_NAMES[isA ? langAEl.value : langBEl.value] || '…';
      turnChipTx.textContent = `Listening for ${lang}`;
      turnChip.className = 'turn-chip visible ' + (isA ? 'active-a' : 'active-b');

      // Highlight the active panel
      panelA.classList.toggle('listening-here',  isA);
      panelB.classList.toggle('listening-here', !isA);
    }

    function showPills(textEl, bubble) {
      textEl.className = 'bubble-text';
      textEl.innerHTML = '<div class="t-pills"><div class="t-pill"></div><div class="t-pill"></div></div>';
      bubble.classList.add('translating');
    }

    function showText(textEl, bubble, text, placeholder) {
      textEl.className = 'bubble-text' + (placeholder ? ' placeholder' : '');
      textEl.textContent = text;
      bubble.classList.remove('translating');
    }

    function showHeard(textEl, text) {
      textEl.className = 'bubble-text';
      textEl.innerHTML = text + '<span class="cursor"></span>';
    }

    // ── Translation ────────────────────────────────────────────────────────
    async function translate(text, src, tgt, isFinal, transEl, transBubble) {
      if (src === tgt) { showText(transEl, transBubble, text, false); return; }
      try {
        const res = await fetch(
          `https://translation.googleapis.com/language/translate/v2?key=${GOOGLE_API_KEY}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ q: text, source: src, target: tgt, format: 'text' })
          }
        );
        const data = await res.json();
        if (data.data?.translations?.[0]) {
          const out = data.data.translations[0].translatedText;
          showText(transEl, transBubble, out, false);
          if (isFinal) addToHistory(text, out, src, tgt);
        } else {
          showText(transEl, transBubble, '[Error: ' + (data.error?.message || '?') + ']', false);
        }
      } catch (e) {
        showText(transEl, transBubble, '[Network error]', false);
      }
    }

    // ── Recognition — one instance, alternating turns ──────────────────────
    function listen() {
      if (!SpeechRecognition || !isSessionActive) return;

      // Tear down any existing instance
      if (recog) {
        try { recog.stop(); } catch (e) {}
        recog = null;
      }

      const isA    = currentTurn === 'A';
      const src    = isA ? langAEl.value : langBEl.value;
      const tgt    = isA ? langBEl.value : langAEl.value;
      const heardEl   = isA ? txtA_h : txtB_h;
      const heardBub  = isA ? bubA_h : bubB_h;
      const transEl   = isA ? txtA_t : txtB_t;
      const transBub  = isA ? bubA_t : bubB_t;

      const r = new SpeechRecognition();
      r.continuous      = false;   // stop after one utterance, we handle the loop
      r.interimResults  = true;
      r.lang            = SPEECH_LANG[src] || src;

      let gotFinal = false;

      r.onresult = (event) => {
        let interim = '', final = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const t = event.results[i][0].transcript;
          if (event.results[i].isFinal) final += t;
          else interim += t;
        }
        const display = (final || interim).trim();
        if (!display) return;

        showHeard(heardEl, display);

        if (final && !gotFinal) {
          gotFinal = true;
          showPills(transEl, transBub);
          translate(final.trim(), src, tgt, true, transEl, transBub);
          // Switch turn — the recognition's onend will call listen() again
          currentTurn = isA ? 'B' : 'A';
          updateTurnIndicator();
        }
      };

      r.onerror = (e) => {
        // 'no-speech' is normal silence — onend restarts automatically
        if (e.error === 'not-allowed') {
          isSessionActive = false;
          stopSession();
          setStatus('', 'Mic denied');
        }
      };

      r.onend = () => {
        if (!isSessionActive) return;
        // Small gap so the mic has time to fully release before restarting
        clearTimeout(restartTimer);
        restartTimer = setTimeout(listen, 250);
      };

      recog = r;
      try {
        r.start();
        updateTurnIndicator();
        setStatus('listening', 'Listening…');
      } catch (e) {
        console.error('Recognition start error:', e);
        clearTimeout(restartTimer);
        restartTimer = setTimeout(listen, 500);
      }
    }

    function startSession() {
      isSessionActive = true;
      currentTurn = 'A';
      micBtn.classList.add('recording');
      micIcon.textContent = '⏹';
      micRing.classList.add('show');
      listen();
    }

    function stopSession() {
      isSessionActive = false;
      clearTimeout(restartTimer);
      if (recog) { try { recog.stop(); } catch (e) {} recog = null; }
      micBtn.classList.remove('recording');
      micIcon.textContent = '🎤';
      micRing.classList.remove('show');
      panelA.classList.remove('listening-here');
      panelB.classList.remove('listening-here');
      turnChip.className = 'turn-chip';
      setStatus('active', 'Ready');
    }

    micBtn.addEventListener('click', () => {
      if (isSessionActive) stopSession();
      else startSession();
    });

    // ── Language / swap ────────────────────────────────────────────────────
    function updateLabels() {
      const a = LANG_NAMES[langAEl.value] || langAEl.value;
      const b = LANG_NAMES[langBEl.value] || langBEl.value;
      lblA_lang.textContent   = a;
      lblA_target.textContent = b;
      lblB_lang.textContent   = b;
      lblB_target.textContent = a;
    }

    function onLangChange() {
      updateLabels();
      if (isSessionActive) {
        // Restart the current recognition with the updated language
        clearTimeout(restartTimer);
        if (recog) { try { recog.stop(); } catch (e) {} recog = null; }
        restartTimer = setTimeout(listen, 150);
      }
    }

    langAEl.addEventListener('change', onLangChange);
    langBEl.addEventListener('change', onLangChange);

    swapBtn.addEventListener('click', () => {
      swapBtn.classList.add('spinning');
      setTimeout(() => swapBtn.classList.remove('spinning'), 300);
      const tmp = langAEl.value;
      langAEl.value = langBEl.value;
      langBEl.value = tmp;
      // Also flip the active turn so the same "person" keeps going
      if (isSessionActive) currentTurn = currentTurn === 'A' ? 'B' : 'A';
      onLangChange();
    });

    // ── Clear ──────────────────────────────────────────────────────────────
    clearBtn.addEventListener('click', () => {
      history.length = 0;
      historySection.style.display = 'none';
      historyList.innerHTML = '';
      showText(txtA_h, bubA_h, 'Waiting to listen…', true);
      showText(txtA_t, bubA_t, 'Translation will appear here', true);
      showText(txtB_h, bubB_h, 'Waiting to listen…', true);
      showText(txtB_t, bubB_t, 'Translation will appear here', true);
    });

    // ── History ────────────────────────────────────────────────────────────
    function addToHistory(original, translated, src, tgt) {
      const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
      history.unshift({
        original, translated,
        src: LANG_NAMES[src] || src,
        tgt: LANG_NAMES[tgt] || tgt,
        time
      });
      if (history.length > 20) history.pop();
      historySection.style.display = 'flex';
      historyList.innerHTML = '';
      history.forEach(item => {
        const el = document.createElement('div');
        el.className = 'history-item';
        el.innerHTML = `
          <div class="history-original">"${item.original}"</div>
          <div class="history-translated">"${item.translated}"</div>
          <div class="history-meta">${item.src} → ${item.tgt} · ${item.time}</div>
        `;
        historyList.appendChild(el);
      });
    }

    // ── Init ───────────────────────────────────────────────────────────────
    updateLabels();
    setStatus('active', 'Ready');
  </script>
</body>
</html>
